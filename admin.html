<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DSE Admin</title>
  <style>
    :root {
      --ink: #1C1A17; --gold: #E8A547; --bone: #F4EFE6;
      --espresso: #3D2817; --danger: #E48169; --success: #9BCB76;
      --night: #16140f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--ink); color: var(--bone); font: 14px/1.5 system-ui, sans-serif; padding: 32px 24px 80px; }
    h1 { font-size: 24px; color: var(--gold); letter-spacing: 0.04em; margin-bottom: 6px; }
    .subtitle { color: rgba(244,239,230,.5); font-size: 13px; margin-bottom: 32px; }
    .login-wrap { max-width: 380px; margin: 80px auto; display: flex; flex-direction: column; gap: 14px; }
    label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(244,239,230,.6); display: block; margin-bottom: 6px; }
    input[type=password], input[type=text] {
      width: 100%; padding: 12px 16px; background: var(--night);
      border: 1px solid rgba(232,165,71,.35); color: var(--bone); font: inherit;
    }
    input:focus { outline: 2px solid var(--gold); outline-offset: 2px; border-color: var(--gold); }
    button { padding: 12px 24px; background: var(--gold); color: var(--ink); border: 0; font: inherit; font-weight: 600; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; font-size: 13px; }
    button:hover { filter: brightness(1.08); }
    button.outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
    .error { color: var(--danger); font-size: 13px; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid rgba(232,165,71,.25); }
    .tab { padding: 10px 22px; cursor: pointer; font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(244,239,230,.55); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .panel { display: none; }
    .panel.active { display: block; }
    .actions { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .actions .count { color: rgba(244,239,230,.5); font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 9px 12px; background: var(--espresso); color: var(--gold); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
    td { padding: 9px 12px; border-bottom: 1px solid rgba(244,239,230,.08); vertical-align: top; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .badge { display: inline-block; padding: 2px 8px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    .badge.pending         { background: rgba(232,165,71,.18); color: var(--gold); }
    .badge.confirmed       { background: rgba(155,203,118,.18); color: var(--success); }
    .badge.out-for-delivery { background: rgba(100,160,255,.18); color: #8ab4f8; }
    .badge.delivered       { background: rgba(155,203,118,.35); color: var(--success); }
    .badge.cancelled       { background: rgba(228,129,105,.18); color: var(--danger); }
    select { background: var(--night); border: 1px solid rgba(232,165,71,.3); color: var(--bone); font: inherit; font-size: 12px; padding: 4px 8px; cursor: pointer; }
    .items-list { color: rgba(244,239,230,.7); font-size: 12px; line-height: 1.6; }
    .stat-row { display: flex; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat { background: var(--espresso); border: 1px solid rgba(232,165,71,.2); padding: 16px 22px; min-width: 160px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(244,239,230,.5); margin-bottom: 6px; }
    .stat-value { font-size: 28px; color: var(--gold); font-weight: 700; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen" style="max-width:380px;margin:80px auto;display:flex;flex-direction:column;gap:14px">
  <h1>DSE Admin</h1>
  <p class="subtitle">Double Shot Electric · Las Vegas</p>
  <div>
    <label for="admin-key-input">Admin key</label>
    <input type="password" id="admin-key-input" placeholder="Enter admin key" />
  </div>
  <button onclick="login()">Unlock</button>
  <p class="error" id="login-error"></p>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <h1>Double Shot Electric Admin</h1>
  <p class="subtitle" id="dash-subtitle"></p>
  <br>
  <div class="stat-row" id="stat-row"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders')">Orders</button>
    <button class="tab" onclick="switchTab('waitlist')">Waitlist</button>
  </div>

  <div class="panel active" id="panel-orders">
    <div class="actions">
      <span class="count" id="orders-count"></span>
      <a id="orders-csv-link" href="#" class="outline" style="padding:6px 14px;border:1px solid rgba(232,165,71,.4);color:var(--gold);text-decoration:none;font-size:12px;letter-spacing:.08em;text-transform:uppercase">Export CSV</a>
    </div>
    <table id="orders-table">
      <thead><tr>
        <th>#</th><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th>
      </tr></thead>
      <tbody id="orders-tbody"></tbody>
    </table>
  </div>

  <div class="panel" id="panel-waitlist">
    <div class="actions">
      <span class="count" id="waitlist-count"></span>
      <a id="waitlist-csv-link" href="#" class="outline" style="padding:6px 14px;border:1px solid rgba(232,165,71,.4);color:var(--gold);text-decoration:none;font-size:12px;letter-spacing:.08em;text-transform:uppercase">Export CSV</a>
    </div>
    <table>
      <thead><tr><th>#</th><th>Email</th><th>ZIP</th><th>Signed up</th></tr></thead>
      <tbody id="waitlist-tbody"></tbody>
    </table>
  </div>
</div>

<script>
  let ADMIN_KEY = "";
  const STATUS_OPTIONS = ["pending","confirmed","out-for-delivery","delivered","cancelled"];

  function login() {
    const key = document.getElementById("admin-key-input").value.trim();
    if (!key) return;
    ADMIN_KEY = key;
    fetch("/api/admin/orders?key=" + encodeURIComponent(key))
      .then(r => { if (!r.ok) throw new Error("bad key"); return r.json(); })
      .then(() => { document.getElementById("login-screen").style.display = "none"; document.getElementById("dashboard").style.display = "block"; loadData(); })
      .catch(() => { document.getElementById("login-error").textContent = "Invalid admin key."; });
  }

  document.getElementById("admin-key-input").addEventListener("keydown", e => { if (e.key === "Enter") login(); });

  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", ["orders","waitlist"][i] === tab));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById("panel-" + tab).classList.add("active");
  }

  async function loadData() {
    document.getElementById("orders-csv-link").href = "/api/admin/orders.csv?key=" + encodeURIComponent(ADMIN_KEY);
    document.getElementById("waitlist-csv-link").href = "/api/admin/waitlist.csv?key=" + encodeURIComponent(ADMIN_KEY);

    const [orders, waitlist] = await Promise.all([
      fetch("/api/admin/orders?key="   + encodeURIComponent(ADMIN_KEY)).then(r => r.json()),
      fetch("/api/admin/waitlist?key=" + encodeURIComponent(ADMIN_KEY)).then(r => r.json()),
    ]);

    const revenue = orders.filter(o => o.status !== "cancelled").reduce((s, o) => s + o.subtotal, 0);
    document.getElementById("stat-row").innerHTML = `
      <div class="stat"><div class="stat-label">Orders</div><div class="stat-value">${orders.length}</div></div>
      <div class="stat"><div class="stat-label">Revenue (COD)</div><div class="stat-value">$${revenue}</div></div>
      <div class="stat"><div class="stat-label">Waitlist</div><div class="stat-value">${waitlist.length}</div></div>
    `;
    document.getElementById("dash-subtitle").textContent = `Last updated ${new Date().toLocaleTimeString()}`;
    document.getElementById("orders-count").textContent = orders.length + " orders";
    document.getElementById("waitlist-count").textContent = waitlist.length + " signups";

    document.getElementById("orders-tbody").innerHTML = orders.map(o => `
      <tr>
        <td>${o.id}</td>
        <td style="font-family:monospace;color:var(--gold);font-size:12px">${o.order_number}</td>
        <td>
          <strong>${o.name}</strong><br>
          <span style="color:rgba(244,239,230,.6);font-size:12px">${o.email}</span><br>
          <span style="color:rgba(244,239,230,.5);font-size:12px">${o.address}, ${o.zip}</span>
          ${o.phone ? `<br><span style="color:rgba(244,239,230,.5);font-size:12px">${o.phone}</span>` : ""}
          ${o.notes ? `<br><em style="color:rgba(244,239,230,.45);font-size:11px">${o.notes}</em>` : ""}
        </td>
        <td class="items-list">${o.items.map(i => `${i.name} × ${i.quantity}`).join("<br>")}</td>
        <td style="color:var(--gold);font-weight:600">$${o.subtotal}</td>
        <td>
          <select onchange="updateStatus(${o.id}, this.value)">
            ${STATUS_OPTIONS.map(s => `<option value="${s}" ${s === o.status ? "selected" : ""}>${s}</option>`).join("")}
          </select>
        </td>
        <td style="color:rgba(244,239,230,.5);font-size:12px;white-space:nowrap">${new Date(o.created_at).toLocaleDateString()}</td>
      </tr>`).join("");

    document.getElementById("waitlist-tbody").innerHTML = waitlist.map(w => `
      <tr>
        <td>${w.id}</td>
        <td>${w.email}</td>
        <td>${w.zip}</td>
        <td style="color:rgba(244,239,230,.5);font-size:12px">${new Date(w.created_at).toLocaleDateString()}</td>
      </tr>`).join("");
  }

  async function updateStatus(id, status) {
    await fetch(`/api/admin/orders/${id}/status?key=` + encodeURIComponent(ADMIN_KEY), {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
  }
</script>
</body>
</html>
